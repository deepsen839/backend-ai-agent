version: "3.9"

services:

  backend:

    build:
      context: ./app

    container_name: sales_backend

    env_file:
      - ./app/.env

    ports:
      - "8000:8000"

    volumes:
      - ./app:/app

  frontend:

    build:
      context: ./frontend

    container_name: sales_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules